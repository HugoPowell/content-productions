<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Content Productions</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <div class="container">
    <h2 class="headline top-left">Contact</h2>

    <form
      id="contact-form"
      action="https://formspree.io/f/myzrqynd"
      method="POST"
      class="contact-form"
    >
      <!-- Honeypot (spam protection) -->
      <input type="text" name="company" tabindex="-1" autocomplete="off" class="hp">

      <label for="name">Name</label>
      <input type="text" id="name" name="name" required>

      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>

      <label for="message">Message</label>
      <textarea id="message" name="message" rows="5" required></textarea>

      <button type="submit" class="btn submit-btn">Send</button>

      <p id="form-status" class="form-status"></p>
    </form>
  </div>

  <a href="../index.html" class="next centered">← home</a>
  <a href="page4.html" class="back centered">← back</a>

  <script>
    const form = document.getElementById('contact-form');
    const status = document.getElementById('form-status');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = new FormData(form);

      try {
        const response = await fetch(form.action, {
          method: form.method,
          body: data,
          headers: { 'Accept': 'application/json' }
        });

        if (response.ok) {
          window.location.href = "../thank-you.html";

        } else {
          status.textContent = "Something went wrong. Please try again.";
        }
      } catch (error) {
        status.textContent = "Network error. Please try again later.";
      }
    });
  </script>
</body>
</html>
