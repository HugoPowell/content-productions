<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Content Productions</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <div class="container">
    <h2 class="headline top-left">Contact</h2>

    <form
      id="contact-form"
      action="https://formspree.io/f/YOUR_FORM_ID"
      method="POST"
      class="contact-form"
    >
      <input type="text" name="_gotcha" class="hp">

      <label for="name">Nom</label>
      <input type="text" id="name" name="name" required>

      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>

      <label for="message">Message</label>
      <textarea id="message" name="message" rows="5" required></textarea>

      <button type="submit" class="btn submit-btn">Envoyer</button>

      <p id="form-status" class="form-status"></p>
    </form>
  </div>

  <a href="../index.html" class="next centered">← accueil</a>
  <a href="page4.html" class="back centered">← retour</a>

  <script>
    const form = document.getElementById('contact-form');
    const status = document.getElementById('form-status');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      status.textContent = "";

      const data = new FormData(form);

      try {
        const response = await fetch(form.action, {
          method: "POST",
          body: data,
          headers: { "Accept": "application/json" }
        });

        if (response.ok) {
          window.location.href = "../thank-you.html";
        } else {
          status.textContent = "Une erreur est survenue. Veuillez réessayer.";
        }
      } catch {
        status.textContent = "Erreur réseau. Merci de réessayer plus tard.";
      }
    });
  </script>
</body>
</html>
